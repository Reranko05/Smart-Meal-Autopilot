server:
  port: 8080
spring:
  application:
    name: smart-meal-autopilot
  datasource:
    url: jdbc:h2:file:./data/smartmeal
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
  